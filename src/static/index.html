<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>DPMB Online Timetable</title>
    <link rel='stylesheet' href='style.css' />
</head>
<body>
    <div class='container'>
        <div class='status-bar'>
            <span id='clock'></span>
            <a href='#' id='updateBtn' class='update-link' style='display: none;'>Update</a>
        </div>
        
        <div id='contentArea' class='content-area centered'>
            <div id='welcomeText' class='welcome-text'>
                Enter your stop in Brno to see the nearest public transport departures.
            </div>

            <div class='search-section'>
                <div class='input-row'>
                    <div class='input-wrapper'>
                        <input type='text' id='stopInput' placeholder='Enter stop name...' autocomplete='off' />
                        <button id='clearInput' class='clear-input-btn' title='Clear search'>&times;</button>
                    </div>
                </div>
                <div id='suggestions' class='suggestions'></div>
            </div>

            <div id='loading' class='loading' style='display: none;'>
                Loading<span class='dots'>...</span>
            </div>

            <div id='filterContainer' class='filter-container'>
                <div id='routePills' class='route-pills'></div>
                <button id='clearFilter' class='clear-btn' style='display: none;'>Clear</button>
            </div>

            <div id='board' class='board'></div>
            
            <div id='emptyState' class='empty-state' style='display: none;'>
                No departures found for the selected filters.
            </div>

            <div id='errorState' class='error-state' style='display: none;'></div>
        </div>

        <footer class='footer'>
            Made by Futupas, <a href='https://github.com/Futupas/brno-dpmb-online-timetable' target='_blank'>Project's GitHub</a>
        </footer>
    </div>
    <script src='script.js'></script>
</body>
</html>
